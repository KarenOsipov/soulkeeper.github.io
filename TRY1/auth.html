<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulKeeper — Вход и регистрация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0d0b18;
  --ink2: #14121f;
  --ink3: #1c1a2e;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold-d: rgba(201,168,76,0.12);
  --amber: #d4813a;
  --ivory: #f5f0e8;
  --ivory2: #ece5d5;
  --muted: rgba(245,240,232,0.5);
  --muted2: rgba(245,240,232,0.22);
  --green: #3db87a;
  --red: #d84848;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--ink);
  color: var(--ivory);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image: radial-gradient(ellipse at 30% 40%, rgba(80,40,140,0.12) 0%, transparent 60%);
}
.auth-card {
  width: 420px;
  border: 1px solid rgba(201,168,76,0.2);
  padding: 3rem;
  background: var(--ink2);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s forwards;
}
.auth-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 10%;
  right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.auth-logo {
  font-family: var(--serif);
  font-size: 2.2rem;
  color: var(--gold2);
  text-align: center;
  margin-bottom: 0.3rem;
  font-weight: 300;
}
.auth-sub {
  font-size: 0.7rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  margin-bottom: 2.5rem;
  font-weight: 400;
}
.auth-tabs {
  display: flex;
  border-bottom: 1px solid rgba(201,168,76,0.1);
  margin-bottom: 2rem;
}
.auth-tab {
  flex: 1;
  padding: 0.7rem;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.3s;
  font-family: var(--sans);
  font-weight: 400;
}
.auth-tab.active {
  color: var(--gold2);
  border-bottom-color: var(--gold);
}
.auth-form {
  display: none;
}
.auth-form.active {
  display: block;
}
.field {
  margin-bottom: 1.2rem;
}
.field label {
  display: block;
  font-size: 0.67rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
  font-weight: 400;
}
.field input {
  width: 100%;
  background: rgba(201,168,76,0.04);
  border: 1px solid rgba(201,168,76,0.14);
  color: var(--ivory);
  font-family: var(--sans);
  font-size: 0.85rem;
  padding: 0.75rem 1rem;
  outline: none;
  transition: border-color 0.3s;
  font-weight: 300;
}
.field input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(201,168,76,0.06);
}
.btn-gold {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  border: none;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.3s;
}
.btn-gold:hover { opacity: 0.88; }
.btn-outline-sm {
  background: transparent;
  border: 1px solid rgba(201,168,76,0.25);
  color: var(--ivory2);
  font-family: var(--sans);
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.75rem;
  cursor: pointer;
  font-weight: 300;
  transition: all 0.3s;
  width: 100%;
  margin-top: 0.7rem;
}
.btn-outline-sm:hover {
  border-color: var(--gold);
  color: var(--gold2);
  background: var(--gold-d);
}
.auth-err {
  font-size: 0.78rem;
  color: var(--red);
  text-align: center;
  margin-top: 0.7rem;
  display: none;
}
.auth-back {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
  margin-top: 1.2rem;
  cursor: pointer;
  transition: color 0.2s;
}
.auth-back:hover { color: var(--gold2); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (max-width: 640px) {
  .auth-card { width: 100%; max-width: 100%; border-left: none; border-right: none; border-radius: 0; padding: 2rem 1.1rem; }
  body { align-items: flex-start; padding-top: 2.5rem; }
}
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none" style="display:inline-block;vertical-align:middle;margin-right:10px">
      <polygon points="16,2 28,12 22,30 10,30 4,12" fill="rgba(201,168,76,0.18)" stroke="#c9a84c" stroke-width="1"/>
      <polygon points="16,2 28,12 16,10" fill="rgba(201,168,76,0.3)"/>
    </svg>SoulKeeper
  </div>
  <div class="auth-sub">Хранитель твоей жизни</div>
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Войти</button>
    <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Регистрация</button>
  </div>

  <!-- LOGIN -->
  <div class="auth-form active" id="form-login">
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label>Пароль</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-gold" onclick="doLogin()">Войти</button>
    <button class="btn-outline-sm" onclick="doDemoLogin()">◆ Демо-вход (без регистрации)</button>
    <div class="auth-err" id="login-err">Неверный email или пароль</div>
  </div>

  <!-- REGISTER -->
  <div class="auth-form" id="form-register">
    <div class="field"><label>Имя</label><input type="text" id="reg-name" placeholder="Ваше имя" autocomplete="name"></div>
    <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label>Пароль</label><input type="password" id="reg-pass" placeholder="Минимум 6 символов" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <button class="btn-gold" onclick="doRegister()">Создать аккаунт</button>
    <div class="auth-err" id="reg-err"></div>
  </div>

  <div class="auth-back" onclick="window.location.href='index.html'">← Вернуться на главную</div>
</div>

<script>
// LocalStorage helper
function save(key, val) { localStorage.setItem('sk_' + key, JSON.stringify(val)); }
function load(key, def = null) { try { const v = localStorage.getItem('sk_' + key); return v ? JSON.parse(v) : def; } catch { return def; } }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  err.style.display = 'none';

  const users = load('users', []);
  const user = users.find(u => u.email === email && u.pass === btoa(pass));
  if (!user) { err.style.display = 'block'; return; }

  save('user', user);
  window.location.href = 'app.html';
}

function doDemoLogin() {
  const demo = { name: 'Демо Пользователь', email: 'demo@soulkeeper.app', pass: btoa('demo123'), isDemo: true };
  save('user', demo);

  // Seed demo data if not exists
  if (!load('secrets_' + demo.email)) {
    save('secrets_' + demo.email, [
      { id: uid(), title: 'Пароль от банка', category: 'password', content: '[Зашифровано]', access: 'private', date: new Date().toLocaleDateString('ru') },
      { id: uid(), title: 'Завещание', category: 'document', content: 'Квартира переходит старшему сыну...', access: 'after_death', date: new Date().toLocaleDateString('ru') }
    ]);
    save('bio_' + demo.email, [{ id: uid(), title: 'Детство', period: '1970–1985', content: 'Родился в небольшом городке...', date: new Date().toLocaleDateString('ru') }]);
    save('msgs_' + demo.email, [{ id: uid(), to: 'Сын', subject: 'На твою свадьбу', content: 'Дорогой сын...', trigger: 'wedding', date: new Date().toLocaleDateString('ru') }]);
    save('rels_' + demo.email, [
      { id: uid(), name: 'Анна Иванова', rel: 'Дочь', access: 'heir', email: 'anna@example.com', lat: 55.7558, lon: 37.6173, city: 'Москва, Россия' },
      { id: uid(), name: 'Сергей Иванов', rel: 'Сын', access: 'heir', email: 'sergey@example.com', lat: 51.1801, lon: 71.4460, city: 'Астана, Казахстан' }
    ]);
    save('notifs_' + demo.email, [{ id: uid(), title: 'Добро пожаловать в SoulKeeper', sub: 'Демо-режим', time: 'сейчас' }]);
  }
  window.location.href = 'app.html';
}

function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const err = document.getElementById('reg-err');

  if (!name || !email || !pass) { err.textContent = 'Заполните все поля'; err.style.display = 'block'; return; }
  if (pass.length < 6) { err.textContent = 'Пароль минимум 6 символов'; err.style.display = 'block'; return; }

  const users = load('users', []);
  if (users.find(u => u.email === email)) { err.textContent = 'Email уже используется'; err.style.display = 'block'; return; }

  const user = { id: uid(), name, email, pass: btoa(pass), created: new Date().toISOString() };
  users.push(user);
  save('users', users);
  save('user', user);
  window.location.href = 'app.html';
}

// Check URL param for default tab
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('tab') === 'register') {
  switchAuthTab('register');
}
</script>
</body>
</html>
